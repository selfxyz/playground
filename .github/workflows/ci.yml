name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Lint, types, and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: Type check
        run: yarn types

      - name: Unit tests
        run: yarn test
